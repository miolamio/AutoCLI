site: twitter
name: download
description: Download Twitter/X media (images and videos)
domain: x.com
strategy: cookie
browser: true

args:
  username:
    type: str
    positional: true
    description: Twitter username (downloads from media tab)
  tweet-url:
    type: str
    description: Single tweet URL to download
  limit:
    type: int
    default: 10
    description: Number of tweets to scan
  output:
    type: str
    default: ./twitter-downloads
    description: Output directory

columns: [index, type, status, size]

pipeline:
  - navigate:
      url: https://x.com
      settleMs: 3000

  - evaluate: |
      (async () => {
        const username = ${{ args.username | json }};
        const tweetUrl = ${{ args['tweet-url'] | json }};
        const limit = ${{ args.limit }};

        if (!username && !tweetUrl) {
          return [{ index: 0, type: '-', status: 'failed', size: 'Must provide a username or --tweet-url' }];
        }

        // Navigate to appropriate page
        if (tweetUrl) {
          window.location.href = tweetUrl;
        } else {
          window.location.href = 'https://x.com/' + username + '/media';
        }
        await new Promise(r => setTimeout(r, 3000));

        // Scroll to load more content
        if (!tweetUrl) {
          for (let i = 0; i < Math.ceil(limit / 5); i++) {
            window.scrollTo(0, document.body.scrollHeight);
            await new Promise(r => setTimeout(r, 2000));
          }
        }

        const media = [];

        // Find images (high quality)
        document.querySelectorAll('img[src*="pbs.twimg.com/media"]').forEach(img => {
          let src = img.src || '';
          src = src.replace(/&name=\w+$/, '&name=large');
          if (!src.includes('&name=')) {
            src = src + '&name=large';
          }
          media.push({ type: 'image', url: src });
        });

        // Find videos
        document.querySelectorAll('video').forEach(video => {
          const src = video.src || '';
          if (src) {
            media.push({ type: 'video', url: src, poster: video.poster || '' });
          }
        });

        // Find video tweets (for yt-dlp)
        document.querySelectorAll('[data-testid="videoPlayer"]').forEach(player => {
          const tweetLink = player.closest('article')?.querySelector('a[href*="/status/"]');
          const href = tweetLink?.getAttribute('href') || '';
          if (href) {
            media.push({ type: 'video-tweet', url: 'https://x.com' + href });
          }
        });

        if (!media || media.length === 0) {
          return [{ index: 0, type: '-', status: 'failed', size: 'No media found' }];
        }

        // Deduplicate
        const seen = new Set();
        const unique = media.filter(m => {
          if (seen.has(m.url)) return false;
          seen.add(m.url);
          return true;
        }).slice(0, limit);

        return unique.map((m, i) => ({
          index: i + 1,
          type: m.type,
          status: 'found',
          size: m.url,
        }));
      })()
