site: weread
name: notebooks
description: List books that have highlights or notes
domain: weread.qq.com
strategy: cookie
browser: true

pipeline:
  - navigate: https://weread.qq.com

  - evaluate: |
      (async () => {
        const res = await fetch('https://i.weread.qq.com/user/notebooks', { credentials: 'include' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (data?.errcode === -2010) throw new Error('Not logged in to WeRead');
        if (data?.errcode && data.errcode !== 0) throw new Error(data.errmsg || 'WeRead API error');
        const books = data?.books || [];
        return books.map(item => ({
          title: item.book?.title || '',
          author: item.book?.author || '',
          noteCount: (item.bookmarkCount || 0) + (item.reviewCount || 0),
          bookId: item.bookId || '',
        }));
      })()

columns: [title, author, noteCount, bookId]
